<div class="map-view-container">
  <!-- Top Badges Overlay -->
  <div class="badges-overlay" [class.is-collapsed]="isPanelCollapsed">
    <div
      class="d-flex align-items-center justify-content-between w-100 mb-2 panel-header"
      (click)="togglePanel()"
      onkeypress
    >
      <div class="d-flex align-items-center">
        @if (fromParam) {
          <button
            class="btn btn-link p-0 me-2 text-body"
            (click)="goBack()"
            aria-label="Volver"
          >
            <i class="fa-solid fa-arrow-left"></i>
          </button>
        }
        <h6 class="mb-0 fw-bold op-70 text-nowrap">
          <i class="fa-solid fa-truck-moving me-2"></i>Viajes en Curso
        </h6>
      </div>
      <button
        class="btn btn-link btn-sm p-0 text-body collapse-toggle"
        type="button"
        aria-label="Exp"
      >
        <i
          class="fa-solid"
          [class.fa-chevron-down]="isPanelCollapsed"
          [class.fa-chevron-up]="!isPanelCollapsed"
        ></i>
      </button>
    </div>

    <div class="badges-content-wrapper custom-scrollbar">
      <div class="badges-list">
        @if (activeVehicles.length > 1) {
          <div
            class="vehicle-badge"
            [class.active]="selectedVehicleId === null"
            [style.border-color]="'var(--bs-primary)'"
            (click)="showAll()"
            onkeypress
          >
            <span
              class="status-dot"
              [style.background-color]="'var(--bs-primary)'"
            ></span>
            Todos
          </div>
        }

        @for (vehicle of activeVehicles; track vehicle.id) {
          <div
            class="vehicle-badge"
            [class.active]="selectedVehicleId === vehicle.id"
            [style.border-color]="getVehicleColor(vehicle)"
            (click)="focusVehicle(vehicle)"
            onkeypress
          >
            <span
              class="status-dot"
              [style.background-color]="getVehicleColor(vehicle)"
            ></span>
            {{ vehicle.plate }}
          </div>
        } @empty {
          <div class="text-secondary small py-1">
            No hay viajes en curso en este momento.
          </div>
        }
      </div>
    </div>
  </div>

  <!-- Google Map Container -->
  <div id="google-map"></div>

  <!-- Legend -->
  <div class="map-legend">
    <div class="legend-item">
      <div class="legend-icon" style="background-color: #28a745"></div>
      <span>Origen</span>
    </div>
    <div class="legend-item">
      <div class="legend-icon" style="background-color: #dc3545"></div>
      <span>Destino</span>
    </div>
    <div class="legend-item">
      <div
        class="legend-icon"
        style="background-color: var(--bs-primary)"
      ></div>
      <span>Ubicación Actual</span>
    </div>
  </div>
</div>
