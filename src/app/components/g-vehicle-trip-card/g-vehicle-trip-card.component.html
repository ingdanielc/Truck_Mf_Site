<div class="summary-card p-4 rounded-4 shadow-sm border bg-body-tertiary mb-4">
  <div class="row align-items-center gy-3">
    <!-- Vehicle Section -->
    <div class="col-12 col-md-5 border-end-md">
      <div class="d-flex align-items-center gap-3">
        <!-- Vehicle Photo -->
        <div
          class="vehicle-photo flex-shrink-0 rounded-3 overflow-hidden bg-body-secondary d-flex align-items-center justify-content-center"
        >
          @if (vehicle.photo) {
            <img
              [src]="vehicle.photo"
              [alt]="vehicle.plate"
              class="w-100 h-100 object-fit-cover"
            />
          } @else {
            <i class="fa-solid fa-truck fs-2 text-secondary opacity-50"></i>
          }
        </div>
        <div class="overflow-hidden">
          <span class="badge plate-badge mb-1 text-uppercase">{{
            vehicle.plate
          }}</span>
          <h5 class="fw-bold mb-0 text-truncate text-body">
            {{ vehicleBrand }} {{ vehicle.year }}
          </h5>
          <p class="text-secondary small mb-0">
            {{ vehicle.currentDriverName || "Sin conductor" }}
          </p>
        </div>
      </div>
    </div>

    <!-- Trip Section -->
    <div class="col-12 col-md-7">
      <div class="d-flex justify-content-between align-items-center">
        <div class="route-info flex-grow-1 overflow-hidden px-md-3">
          <p
            class="text-secondary small fw-bold mb-1 text-uppercase tracking-wider"
          >
            Ruta del Viaje
          </p>
          <div class="d-flex align-items-center gap-2">
            <span class="fw-bold text-body text-truncate">{{
              originName
            }}</span>
            <i class="fa-solid fa-arrow-right-long text-primary opacity-50"></i>
            <span class="fw-bold text-body text-truncate">{{
              destinationName
            }}</span>
          </div>
          <p class="text-secondary small mb-0 mt-1">
            Viaje Nº {{ trip.numberTrip || trip.manifestNumber }}
          </p>
        </div>
        <div class="status-info text-end">
          <p
            class="text-secondary small fw-bold mb-1 text-uppercase tracking-wider"
          >
            Estado
          </p>
          <span
            class="badge rounded-pill px-3 py-2 fw-bold"
            [ngClass]="getStatusClass(trip.status)"
          >
            {{ trip.status }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
