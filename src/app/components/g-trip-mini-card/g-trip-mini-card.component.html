<div
  class="card border-0 trip-mini-card p-3 p-md-4 rounded-4 shadow-sm h-100 cursor-pointer overflow-hidden position-relative"
  [ngClass]="containerClass"
  [class.is-selected]="isSelected"
>
  <!-- Headers Row -->
  <div
    class="d-flex justify-content-between align-items-center mb-1 position-relative z-1"
  >
    <h6 class="header-label mb-0">RUTA</h6>
    <h6 class="header-label mb-0">ESTADO</h6>
  </div>

  <div
    class="d-flex justify-content-between align-items-start position-relative z-1"
  >
    <div class="route-info flex-grow-1 overflow-hidden">
      <div class="d-flex align-items-center gap-2">
        <span class="location-text text-truncate">{{ origin }}</span>
        <i class="fa-solid fa-arrow-right arrow-icon flex-shrink-0"></i>
        <span class="location-text text-truncate">{{ destination }}</span>
      </div>
      @if (numberTrip) {
        <p class="text-secondary small mb-0 mt-1 trip-number">
          Viaje Nº {{ numberTrip }}
        </p>
      }
    </div>
    <div class="status-info text-end ms-2 mt-1">
      <span
        class="badge rounded-pill px-2 py-2 status-badge fw-bold"
        [ngClass]="statusClass"
      >
        {{ status }}
      </span>
    </div>
  </div>

  <!-- Background graphics for total-card -->
  @if (containerClass === "total-card") {
    <div class="bg-graphic"></div>
  }
</div>
